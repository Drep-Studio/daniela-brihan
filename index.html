<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniela ❤️ Brihan</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }

.text {
  position:absolute;
  bottom:8%;
  width:100%;
  text-align:center;
  color:white;
  font-size:1.8em;
  text-shadow:0 0 10px #ff00cc,0 0 20px #6a00ff;
}

button {
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff00cc;
  color:white;
}
</style>
</head>

<body>

<button onclick="playMusic()">🎵 Música</button>
<div class="text">Daniela ❤️ Brihan</div>

<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
// escena
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// corazón
function heartShape(){
  const s = new THREE.Shape();
  s.moveTo(0,0);
  s.bezierCurveTo(0,1.5,-2,1.5,-2,0);
  s.bezierCurveTo(-2,-2,0,-3,0,-4);
  s.bezierCurveTo(0,-3,2,-2,2,0);
  s.bezierCurveTo(2,1.5,0,1.5,0,0);
  return s;
}

const heart = new THREE.Mesh(
  new THREE.ExtrudeGeometry(heartShape(), { depth:0.5, bevelEnabled:true }),
  new THREE.MeshStandardMaterial({ color:0xff00cc, emissive:0x6a00ff })
);
heart.scale.set(0.5,0.5,0.5);
scene.add(heart);

// luces
scene.add(new THREE.PointLight(0xff00cc,2,50).position.set(5,5,5));
scene.add(new THREE.PointLight(0x6a00ff,2,50).position.set(-5,-5,5));

// partículas tipo Tlanex
const count = 8000;
const geo = new THREE.BufferGeometry();
const pos = new Float32Array(count*3);

for(let i=0;i<count;i++){
  const i3 = i*3;
  const r = Math.random()*10;
  const angle = r*1.5 + Math.random()*2;

  pos[i3] = Math.cos(angle)*r;
  pos[i3+1] = (Math.random()-0.5)*2;
  pos[i3+2] = Math.sin(angle)*r;
}

geo.setAttribute('position', new THREE.BufferAttribute(pos,3));

const mat = new THREE.PointsMaterial({
  size:0.05,
  color:0xff00cc,
  transparent:true,
  blending:THREE.AdditiveBlending,
  depthWrite:false
});

const particles = new THREE.Points(geo,mat);
scene.add(particles);

// animación tipo "vida"
let t = 0;

function animate(){
  requestAnimationFrame(animate);
  t += 0.01;

  // latido corazón
  const scale = 1 + Math.sin(t*3)*0.1;
  heart.scale.set(scale,scale,scale);

  // movimiento orgánico partículas
  const positions = geo.attributes.position.array;

  for(let i=0;i<count;i++){
    const i3 = i*3;

    positions[i3+1] += Math.sin(t + positions[i3])*0.002;
  }

  geo.attributes.position.needsUpdate = true;

  particles.rotation.y += 0.002;
  particles.rotation.x += 0.0005;

  renderer.render(scene,camera);
}

animate();

// música
function playMusic(){
  document.getElementById("music").play();
}

// responsive
addEventListener("resize",()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
