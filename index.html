<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cosmic Heart ULTRA</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle, #02010a, #000000);
}

canvas {
  display: block;
}
</style>
</head>
<body>

<audio id="music" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 8;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// 🔥 PARTICULAS
const COUNT = 8000;

let geometry = new THREE.BufferGeometry();
let positions = new Float32Array(COUNT * 3);
let targets = new Float32Array(COUNT * 3);

// ❤️ CORAZÓN
function heartShape(){
  let t = Math.random() * Math.PI * 2;
  let x = 16 * Math.pow(Math.sin(t), 3);
  let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
  let z = (Math.random()-0.5)*2;

  return [x*0.05, y*0.05, z];
}

// 🔤 TEXTO EN PARTÍCULAS
function textShape(text){
  let canvas = document.createElement("canvas");
  let ctx = canvas.getContext("2d");

  canvas.width = 800;
  canvas.height = 200;

  ctx.fillStyle = "white";
  ctx.font = "bold 100px Arial";
  ctx.textAlign = "center";
  ctx.fillText(text, 400, 120);

  let data = ctx.getImageData(0,0,800,200).data;
  let points = [];

  for(let y=0;y<200;y+=3){
    for(let x=0;x<800;x+=3){
      let i = (y*800 + x) * 4;
      if(data[i] > 128){
        points.push([
          (x-400)/40,
          (100-y)/40,
          (Math.random()-0.5)
        ]);
      }
    }
  }

  return points;
}

// inicial
for(let i=0;i<COUNT;i++){
  let [x,y,z] = heartShape();
  positions[i*3] = x;
  positions[i*3+1] = y;
  positions[i*3+2] = z;

  targets[i*3] = x;
  targets[i*3+1] = y;
  targets[i*3+2] = z;
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions,3));

// ✨ MATERIAL CON GLOW
let material = new THREE.PointsMaterial({
  color: 0xff4d88,
  size: 0.04,
  transparent: true,
  opacity: 0.9,
  blending: THREE.AdditiveBlending
});

let particles = new THREE.Points(geometry, material);
scene.add(particles);

// 🌌 ESTRELLAS
let starGeo = new THREE.BufferGeometry();
let starArr = [];

for(let i=0;i<5000;i++){
  starArr.push(
    (Math.random()-0.5)*60,
    (Math.random()-0.5)*60,
    (Math.random()-0.5)*60
  );
}

starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starArr,3));

let starMat = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.02
});

let stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// 🖱️ INTERACCIÓN
let mouseX = 0;
let mouseY = 0;

function move(x,y){
  mouseX = (x/innerWidth - 0.5);
  mouseY = (y/innerHeight - 0.5);
}

document.addEventListener("mousemove", e=>move(e.clientX,e.clientY));
document.addEventListener("touchmove", e=>move(e.touches[0].clientX,e.touches[0].clientY));

// 🔄 TRANSICIÓN PRO
let mode = 0;
let textPoints = textShape("DANIELA ❤️ BRIHAN");

function switchShape(){
  mode = (mode + 1) % 3;

  for(let i=0;i<COUNT;i++){
    let target;

    if(mode === 0){
      target = heartShape();
    }
    else if(mode === 1){
      target = textPoints[i % textPoints.length];
    }
    else{
      target = [
        (Math.random()-0.5)*10,
        (Math.random()-0.5)*10,
        (Math.random()-0.5)*10
      ];
    }

    targets[i*3] = target[0];
    targets[i*3+1] = target[1];
    targets[i*3+2] = target[2];
  }
}

setInterval(switchShape, 6000);

// 🎬 ANIMACIÓN
function animate(){
  requestAnimationFrame(animate);

  let pos = geometry.attributes.position.array;

  for(let i=0;i<COUNT;i++){
    pos[i*3] += (targets[i*3] - pos[i*3]) * 0.03;
    pos[i*3+1] += (targets[i*3+1] - pos[i*3+1]) * 0.03;
    pos[i*3+2] += (targets[i*3+2] - pos[i*3+2]) * 0.03;
  }

  geometry.attributes.position.needsUpdate = true;

  particles.rotation.y += 0.002 + mouseX * 0.08;
  particles.rotation.x += mouseY * 0.08;

  stars.rotation.y += 0.0006;

  renderer.render(scene, camera);
}

animate();

// 🎵 MÚSICA
document.body.addEventListener("click", ()=>{
  document.getElementById("music").play();
});

// 📱 RESPONSIVE
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
