<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BRIHAN ❤️ DANIELA</title>

<style>
body{margin:0;overflow:hidden;background:black;font-family:sans-serif;}
canvas{display:block;}

#card{
 position:fixed;inset:0;
 display:flex;align-items:center;justify-content:center;
 background:rgba(0,0,0,.75);
 opacity:0;pointer-events:none;
 transition:.5s;
}
#card.show{opacity:1;pointer-events:auto;}

.panel{
 background:rgba(20,20,20,.85);
 padding:25px;border-radius:20px;
 color:white;text-align:center;
}

.btn{
 margin-top:15px;
 padding:10px 18px;
 border:1px solid #fff;
 border-radius:20px;
 cursor:pointer;
}
</style>
</head>
<body>

<audio id="music" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<div id="card">
 <div class="panel">
  <h2>Para ti 💖</h2>
  <p>Daniela, eres mi universo entero. Te amo.</p>
  <div class="btn" onclick="location.reload()">Repetir ✨</div>
 </div>
</div>

<!-- ✅ LIBRERÍAS ESTABLES -->
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>

<script>
// ESCENA
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(65,innerWidth/innerHeight,0.1,1000);
camera.position.z=40;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// 💡 LUZ
const light = new THREE.PointLight(0xffffff,2,100);
scene.add(light);

// ❤️ CORAZÓN
function heart(){
 let t=Math.random()*Math.PI*2;
 let x=16*Math.pow(Math.sin(t),3);
 let y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
 return [x*0.035,y*0.035,0];
}

// TEXTO
function textShape(text,offset){
 let c=document.createElement("canvas");
 let ctx=c.getContext("2d");
 c.width=900;c.height=250;
 ctx.fillStyle="white";
 ctx.font="bold 120px Arial";
 ctx.textAlign="center";
 ctx.fillText(text,450,150);

 let data=ctx.getImageData(0,0,900,250).data;
 let pts=[];

 for(let y=0;y<250;y+=3){
  for(let x=0;x<900;x+=3){
   let i=(y*900+x)*4;
   if(data[i]>150){
    pts.push([(x-450)/45+offset,(125-y)/45,0]);
   }
  }
 }
 return pts;
}

let final=[
 ...textShape("BRIHAN",-5),
 ...Array(3000).fill().map(heart),
 ...textShape("DANIELA",5)
];

// PARTICULAS
const COUNT=12000;
let geo=new THREE.BufferGeometry();
let pos=new Float32Array(COUNT*3);
let target=new Float32Array(COUNT*3);

for(let i=0;i<COUNT;i++){
 pos[i*3]=(Math.random()-0.5)*100;
 pos[i*3+1]=(Math.random()-0.5)*100;
 pos[i*3+2]=(Math.random()-0.5)*100;

 let p=final[i%final.length];
 target[i*3]=p[0];
 target[i*3+1]=p[1];
 target[i*3+2]=p[2];
}

geo.setAttribute('position',new THREE.BufferAttribute(pos,3));

let mat=new THREE.PointsMaterial({
 color:0xffffff,
 size:0.05,
 transparent:true
});

let particles=new THREE.Points(geo,mat);
particles.scale.z=0.2;
scene.add(particles);

// 🌌 GALAXIA
let galaxyGeo=new THREE.BufferGeometry();
let gPos=[], gColor=[];

for(let i=0;i<5000;i++){
 let r=Math.random()*70;
 let a=r*0.25;

 let x=Math.cos(a)*r;
 let z=Math.sin(a)*r;
 let y=(Math.random()-0.5)*10;

 gPos.push(x,y,z);

 gColor.push(0.8,0.6,1.0); // blanco-violeta
}

galaxyGeo.setAttribute('position',new THREE.Float32BufferAttribute(gPos,3));
galaxyGeo.setAttribute('color',new THREE.Float32BufferAttribute(gColor,3));

let galaxy=new THREE.Points(galaxyGeo,new THREE.PointsMaterial({
 size:0.05,
 vertexColors:true,
 transparent:true,
 opacity:0.6
}));

scene.add(galaxy);

// ANIMACIÓN
let t=0, formed=false;

function animate(){
 requestAnimationFrame(animate);
 t+=0.02;

 let arr=geo.attributes.position.array;

 for(let i=0;i<COUNT;i++){
  arr[i*3]+=(target[i*3]-arr[i*3])*0.02;
  arr[i*3+1]+=(target[i*3+1]-arr[i*3+1])*0.02;
  arr[i*3+2]+=(target[i*3+2]-arr[i*3+2])*0.02;
 }
 geo.attributes.position.needsUpdate=true;

 camera.position.z+=(14-camera.position.z)*0.02;

 // 💓 LATIDO
 let beat=1+Math.sin(t*2)*0.03;
 particles.scale.set(beat,beat,0.2);

 // 🌌 GALAXIA
 galaxy.scale.set(beat,beat,beat);
 galaxy.rotation.y+=0.001;

 // 💡 LUZ
 light.position.set(0,0,0);
 light.intensity=2+Math.sin(t*2)*2;

 if(!formed && camera.position.z<15){
  formed=true;
  document.getElementById("music").play().catch(()=>{});
 }

 if(formed && t>10){
  document.getElementById("card").classList.add("show");
 }

 renderer.render(scene,camera);
}

animate();

// RESPONSIVE
window.addEventListener("resize",()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
