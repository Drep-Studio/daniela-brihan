<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Love Cinematic</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}
canvas { display: block; }

#start {
  position: absolute;
  top: 50%;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 30px;
  font-family: Arial;
  cursor: pointer;
}
</style>
</head>
<body>

<div id="start">✨ Toca para comenzar ✨</div>

<audio id="music" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();

// 🎥 CÁMARA CINEMÁTICA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 30;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.fog = new THREE.Fog(0x000000, 10, 60);

// 🔥 PARTICULAS
const COUNT = 10000;
let geometry = new THREE.BufferGeometry();
let positions = new Float32Array(COUNT*3);
let targets = new Float32Array(COUNT*3);

// ❤️ CORAZÓN
function heart(){
  let t = Math.random()*Math.PI*2;
  let x = 16*Math.pow(Math.sin(t),3);
  let y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
  let z = (Math.random()-0.5)*6;
  return [x*0.05,y*0.05,z];
}

// TEXTO
function textShape(text){
  let c = document.createElement("canvas");
  let ctx = c.getContext("2d");
  c.width = 900; c.height = 250;

  ctx.fillStyle="white";
  ctx.font="bold 110px Arial";
  ctx.textAlign="center";
  ctx.fillText(text,450,150);

  let data = ctx.getImageData(0,0,900,250).data;
  let pts=[];

  for(let y=0;y<250;y+=3){
    for(let x=0;x<900;x+=3){
      let i=(y*900+x)*4;
      if(data[i]>128){
        pts.push([(x-450)/40,(125-y)/40,(Math.random()-0.5)*4]);
      }
    }
  }
  return pts;
}

// inicial disperso (entrada épica)
for(let i=0;i<COUNT;i++){
  positions[i*3]=(Math.random()-0.5)*80;
  positions[i*3+1]=(Math.random()-0.5)*80;
  positions[i*3+2]=(Math.random()-0.5)*80;
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions,3));

let material = new THREE.PointsMaterial({
  color: 0xff4d88,
  size: 0.05,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite:false
});

let particles = new THREE.Points(geometry, material);
scene.add(particles);

// estrellas
let starGeo = new THREE.BufferGeometry();
let starArr=[];
for(let i=0;i<7000;i++){
  starArr.push((Math.random()-0.5)*120,(Math.random()-0.5)*120,(Math.random()-0.5)*120);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starArr,3));

let stars = new THREE.Points(starGeo,new THREE.PointsMaterial({size:0.03}));
scene.add(stars);

// 🎬 MODOS
let mode = 0;
let textPts = textShape("DANIELA ❤️ BRIHAN");

// transición
function setShape(){
  for(let i=0;i<COUNT;i++){
    let t;

    if(mode===0) t = heart();
    else if(mode===1) t = textPts[i % textPts.length];
    else t = [(Math.random()-0.5)*20,(Math.random()-0.5)*20,(Math.random()-0.5)*20];

    targets[i*3]=t[0];
    targets[i*3+1]=t[1];
    targets[i*3+2]=t[2];
  }
}

// secuencia cinematográfica
setTimeout(()=>{ mode=0; setShape(); },1000);
setTimeout(()=>{ mode=1; setShape(); },8000);
setTimeout(()=>{ mode=2; setShape(); },14000);
setTimeout(()=>{ mode=0; setShape(); },18000);

// 🖱️ interacción
let mx=0,my=0;
function move(x,y){
  mx=(x/innerWidth-0.5);
  my=(y/innerHeight-0.5);
}
document.addEventListener("mousemove",e=>move(e.clientX,e.clientY));
document.addEventListener("touchmove",e=>move(e.touches[0].clientX,e.touches[0].clientY));

// 🎬 ANIMACIÓN
let time=0;

function animate(){
  requestAnimationFrame(animate);
  time+=0.03;

  let pos = geometry.attributes.position.array;

  for(let i=0;i<COUNT;i++){
    pos[i*3]+= (targets[i*3]-pos[i*3])*0.02;
    pos[i*3+1]+= (targets[i*3+1]-pos[i*3+1])*0.02;
    pos[i*3+2]+= (targets[i*3+2]-pos[i*3+2])*0.02;
  }

  geometry.attributes.position.needsUpdate=true;

  // 💓 latido
  let scale = 1 + Math.sin(time*3)*0.05;
  particles.scale.set(scale,scale,scale);

  // 🎥 zoom cinematográfico
  camera.position.z += (10 - camera.position.z)*0.02;

  camera.position.x += (mx*5 - camera.position.x)*0.05;
  camera.position.y += (-my*5 - camera.position.y)*0.05;

  camera.lookAt(scene.position);

  particles.rotation.y += 0.003;
  stars.rotation.y += 0.001;

  renderer.render(scene,camera);
}

animate();

// inicio
document.getElementById("start").onclick=()=>{
  document.getElementById("music").play();
  document.getElementById("start").style.display="none";
};

// responsive
window.addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
