<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Love Cinematic</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
}
canvas{display:block;}
</style>
</head>
<body>

<audio id="music" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
// ESCENA
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(65,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,0,40);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// BLOOM
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene,camera));

const bloom = new THREE.UnrealBloomPass(
 new THREE.Vector2(innerWidth,innerHeight),
 1.3,0.6,0.9
);
composer.addPass(bloom);

// ❤️ CORAZÓN
function heart(){
 let t=Math.random()*Math.PI*2;
 let x=16*Math.pow(Math.sin(t),3);
 let y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
 return [x*0.035,y*0.035,0];
}

// TEXTO
function textShape(text,offsetX){
 let c=document.createElement("canvas");
 let ctx=c.getContext("2d");

 c.width=900;c.height=250;

 ctx.fillStyle="white";
 ctx.font="bold 120px Arial";
 ctx.textAlign="center";
 ctx.fillText(text,450,150);

 let data=ctx.getImageData(0,0,900,250).data;
 let pts=[];

 for(let y=0;y<250;y+=3){
  for(let x=0;x<900;x+=3){
   let i=(y*900+x)*4;
   if(data[i]>150){
    pts.push([(x-450)/45+offsetX,(125-y)/45,0]);
   }
  }
 }
 return pts;
}

// FORMAS
let left = textShape("BRIHAN",-5);
let right = textShape("DANIELA",5);

let heartPts=[];
for(let i=0;i<3000;i++) heartPts.push(heart());

let finalShape=[...left,...heartPts,...right];

// PARTÍCULAS
const COUNT = 15000;
let geo = new THREE.BufferGeometry();
let pos = new Float32Array(COUNT*3);
let target = new Float32Array(COUNT*3);

// INICIO DISPERSO (ESPACIO)
for(let i=0;i<COUNT;i++){
 pos[i*3]=(Math.random()-0.5)*80;
 pos[i*3+1]=(Math.random()-0.5)*80;
 pos[i*3+2]=(Math.random()-0.5)*80;
}

geo.setAttribute('position',new THREE.BufferAttribute(pos,3));

// OBJETIVO FINAL
for(let i=0;i<COUNT;i++){
 let p=finalShape[i%finalShape.length];
 target[i*3]=p[0];
 target[i*3+1]=p[1];
 target[i*3+2]=p[2];
}

// MATERIAL
let mat = new THREE.PointsMaterial({
 color:0xffffff,
 size:0.04,
 transparent:true,
 blending:THREE.AdditiveBlending,
 depthWrite:false
});

let particles = new THREE.Points(geo,mat);
particles.scale.z = 0.2;
scene.add(particles);

// ESTRELLAS
let starGeo=new THREE.BufferGeometry();
let starArr=[];
for(let i=0;i<6000;i++){
 starArr.push(
  (Math.random()-0.5)*150,
  (Math.random()-0.5)*150,
  (Math.random()-0.5)*150
 );
}
starGeo.setAttribute('position',new THREE.Float32BufferAttribute(starArr,3));

scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({
 size:0.02,opacity:0.5,transparent:true
})));

// PARALLAX
let mx=0,my=0;

function move(x,y){
 mx=(x/innerWidth-0.5);
 my=(y/innerHeight-0.5);
}

document.addEventListener("mousemove",e=>move(e.clientX,e.clientY));
document.addEventListener("touchmove",e=>move(e.touches[0].clientX,e.touches[0].clientY));

// ANIMACIÓN
let started=false;
let time=0;

function animate(){
 requestAnimationFrame(animate);
 time+=0.02;

 let arr = geo.attributes.position.array;

 if(!started && time>1){
  document.getElementById("music").play();
  started=true;
 }

 // transición a forma
 for(let i=0;i<COUNT;i++){
  arr[i*3]+= (target[i*3]-arr[i*3])*0.02;
  arr[i*3+1]+= (target[i*3+1]-arr[i*3+1])*0.02;
  arr[i*3+2]+= (target[i*3+2]-arr[i*3+2])*0.02;
 }

 geo.attributes.position.needsUpdate=true;

 // cámara cinematográfica (zoom)
 camera.position.z += (14 - camera.position.z)*0.02;

 camera.position.x += (mx*3 - camera.position.x)*0.04;
 camera.position.y += (-my*3 - camera.position.y)*0.04;

 camera.lookAt(0,0,0);

 composer.render();
}

animate();

// RESIZE
window.addEventListener("resize",()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
