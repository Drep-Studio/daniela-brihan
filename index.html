<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BRIHAN ❤️ DANIELA</title>

<style>
body{margin:0;overflow:hidden;background:black;}
#start{
 position:absolute;top:50%;width:100%;
 text-align:center;color:white;
 font-size:26px;cursor:pointer;
}
</style>
</head>
<body>

<div id="start">Toca para comenzar ✨</div>

<audio id="music" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
// ESCENA
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(65,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,0,14);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// BLOOM
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene,camera));

const bloom = new THREE.UnrealBloomPass(
 new THREE.Vector2(innerWidth,innerHeight),
 1.4,0.7,0.9
);
composer.addPass(bloom);

// ❤️ CORAZÓN (MUY PLANO)
function heart(){
 let t=Math.random()*Math.PI*2;
 let x=16*Math.pow(Math.sin(t),3);
 let y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);

 return [
  x*0.035,
  y*0.035,
  (Math.random()-0.5)*0.08 // 👈 CLAVE: MUY POCO Z
 ];
}

// TEXTO (PLANO)
function textShape(text,offsetX){
 let c=document.createElement("canvas");
 let ctx=c.getContext("2d");

 c.width=900; c.height=250;

 ctx.fillStyle="white";
 ctx.font="bold 120px Arial";
 ctx.textAlign="center";
 ctx.fillText(text,450,150);

 let data=ctx.getImageData(0,0,900,250).data;
 let pts=[];

 for(let y=0;y<250;y+=2){
  for(let x=0;x<900;x+=2){
   let i=(y*900+x)*4;
   if(data[i]>150){
    pts.push([
     (x-450)/45 + offsetX,
     (125-y)/45,
     (Math.random()-0.5)*0.05 // 👈 PLANO
    ]);
   }
  }
 }

 return pts;
}

// FORMAS
let left = textShape("BRIHAN",-5);
let right = textShape("DANIELA",5);

let heartPts=[];
for(let i=0;i<6000;i++){
 heartPts.push(heart());
}

let all=[...left,...heartPts,...right];

// GEOMETRÍA
let geo = new THREE.BufferGeometry();
let pos = new Float32Array(all.length*3);

for(let i=0;i<all.length;i++){
 pos[i*3]=all[i][0];
 pos[i*3+1]=all[i][1];
 pos[i*3+2]=all[i][2];
}

geo.setAttribute('position',new THREE.BufferAttribute(pos,3));

// SHADER PRO (ILUSIÓN DE VOLUMEN)
let material = new THREE.ShaderMaterial({
 uniforms:{ time:{value:0} },
 vertexShader:`
  uniform float time;
  void main(){
    vec3 p = position;

    // ondulación sutil (vida)
    p.z += sin(p.x*3.0 + time)*0.03;

    gl_Position = projectionMatrix * modelViewMatrix * vec4(p,1.0);

    // tamaño dinámico (profundidad fake)
    gl_PointSize = 2.0 + sin(time + p.x)*0.5;
  }
 `,
 fragmentShader:`
  void main(){
    float d = length(gl_PointCoord - vec2(0.5));
    float alpha = smoothstep(0.5,0.2,d);

    // glow suave
    gl_FragColor = vec4(1.0,1.0,1.0,alpha);
  }
 `,
 transparent:true,
 blending:THREE.AdditiveBlending,
 depthWrite:false
});

let particles = new THREE.Points(geo,material);
scene.add(particles);

// 🌌 ESTRELLAS
let starGeo=new THREE.BufferGeometry();
let starArr=[];
for(let i=0;i<7000;i++){
 starArr.push(
  (Math.random()-0.5)*150,
  (Math.random()-0.5)*150,
  (Math.random()-0.5)*150
 );
}
starGeo.setAttribute('position',new THREE.Float32BufferAttribute(starArr,3));

scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({
 size:0.015,opacity:0.5,transparent:true
})));

// INTERACCIÓN
let mx=0,my=0;

function move(x,y){
 mx=(x/innerWidth-0.5);
 my=(y/innerHeight-0.5);
}

document.addEventListener("mousemove",e=>move(e.clientX,e.clientY));
document.addEventListener("touchmove",e=>move(e.touches[0].clientX,e.touches[0].clientY));

// ANIMACIÓN
function animate(){
 requestAnimationFrame(animate);

 material.uniforms.time.value += 0.03;

 camera.position.x += (mx*4 - camera.position.x)*0.05;
 camera.position.y += (-my*4 - camera.position.y)*0.05;

 camera.lookAt(0,0,0);

 composer.render();
}
animate();

// START
document.getElementById("start").onclick=()=>{
 document.getElementById("music").play();
 document.getElementById("start").style.display="none";
};

window.addEventListener("resize",()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
