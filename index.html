<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Corazón PRO 💖</title>
<style>
  body{margin:0;overflow:hidden;background:#000;}
  canvas{display:block;}
</style>
</head>
<body>

<!-- Three + postprocessing (CDN estable) -->
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
// ===== ESCENA =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 10;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);

// ===== BLOOM (brillo pro) =====
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));
const bloom = new THREE.UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  1.3, 0.6, 0.9
);
composer.addPass(bloom);

// ===== FONDO ESTRELLAS =====
const starGeo = new THREE.BufferGeometry();
const starCount = 3000;
const starArr = new Float32Array(starCount*3);
for(let i=0;i<starCount;i++){
  starArr[i*3]   = (Math.random()-0.5)*120;
  starArr[i*3+1] = (Math.random()-0.5)*120;
  starArr[i*3+2] = (Math.random()-0.5)*120;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starArr,3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({
  size:0.02, opacity:0.6, transparent:true
}));
scene.add(stars);

// ===== CORAZÓN (más denso + profundidad controlada) =====
function createHeart(){
  const pts = new Float32Array(6000*3);
  for(let i=0;i<6000;i++){
    const t = Math.random() * Math.PI * 2;
    const x = 16 * Math.pow(Math.sin(t),3);
    const y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
    pts[i*3]   = x*0.045;
    pts[i*3+1] = y*0.045;
    pts[i*3+2] = (Math.random()-0.5)*0.25; // plano elegante
  }
  return pts;
}

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(createHeart(),3));

// ===== SHADER (color animado + suavidad) =====
const material = new THREE.ShaderMaterial({
  uniforms:{ time:{value:0} },
  vertexShader:`
    uniform float time;
    void main(){
      vec3 p = position;
      // micro-vida
      p.z += sin(p.x*2.0 + time)*0.02;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(p,1.0);
      gl_PointSize = 2.6;
    }
  `,
  fragmentShader:`
    uniform float time;
    void main(){
      float d = length(gl_PointCoord - vec2(0.5));
      float a = smoothstep(0.5,0.15,d);

      // gradiente rosado → violeta animado
      float r = 1.0;
      float g = 0.6 + 0.2*sin(time*0.6);
      float b = 1.0;

      gl_FragColor = vec4(r,g,b,a);
    }
  `,
  transparent:true,
  blending:THREE.AdditiveBlending,
  depthWrite:false
});

const heart = new THREE.Points(geo, material);
heart.scale.z = 0.6;
scene.add(heart);

// ===== INTERACCIÓN (seguimiento + “atracción”) =====
let mx = 0, my = 0;

function setMouse(x,y){
  mx = (x/innerWidth - 0.5) * 6;
  my = (y/innerHeight - 0.5) * 6;
}

addEventListener("mousemove", e=>setMouse(e.clientX,e.clientY));
addEventListener("touchmove", e=>setMouse(e.touches[0].clientX,e.touches[0].clientY));

// ===== ANIMACIÓN =====
let t = 0;

function animate(){
  requestAnimationFrame(animate);
  t += 0.04;
  material.uniforms.time.value = t;

  // 💓 latido (más natural)
  const beat = 1 + Math.sin(t*1.5)*0.08;
  heart.scale.set(beat, beat, 0.6);

  // 🧲 movimiento suave hacia el cursor
  heart.position.x += (mx - heart.position.x) * 0.06;
  heart.position.y += (-my - heart.position.y) * 0.06;

  // leve inclinación para sensación 3D
  heart.rotation.y += (mx*0.1 - heart.rotation.y) * 0.05;
  heart.rotation.x += (-my*0.1 - heart.rotation.x) * 0.05;

  // 🌌 estrellas con parallax
  stars.rotation.y += 0.0005;

  composer.render();
}
animate();

// ===== RESPONSIVE =====
addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
